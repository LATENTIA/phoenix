<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Phoenix">
  <title>Phoenix</title>
  <!-- Bull-candle logo centred inside a dark rounded square. -->

  <rect x="8" y="8" width="224" height="224" rx="32" fill="#0f172a"/>
  <rect x="8.5" y="8.5" width="223" height="223" rx="31.5"
        fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Logo (source viewBox 80x100) scaled ×1.6, visually centred. -->
  <g transform="translate(56, 46) scale(1.6)">
    <line x1="40" y1="86" x2="40" y2="96"
          stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
    <rect x="22" y="32" width="36" height="54" rx="6" fill="#4ade80"/>
    <path d="
      M 40 32
      L 40 22
      C 40 12, 50 8, 56 14
      C 60 18, 56 22, 50 22"
      stroke="#4ade80" stroke-width="6" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

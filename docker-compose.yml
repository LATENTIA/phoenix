# docker-compose.yml
#
# Local Docker workflow for Phoenix. Mirrors the EC2 deployment model:
# env-var driven config, persistent user data on a HOST volume outside the
# image (and outside the project tree), no secrets in the image.
#
# Quickstart:
#   1. cp .env.runtime.example .env.runtime
#   2. Edit .env.runtime (at minimum: PHOENIX_AUTH_USER, PHOENIX_AUTH_PASS_HASH,
#      PHOENIX_SECRET_KEY). The file is gitignored. The $ characters in the
#      password hash do NOT need escaping — env_file values are read as-is.
#   3. If you have a pre-existing data.db / downloaded/ / logs/ from running
#      Phoenix outside Docker:
#         python scripts/migrate-to-docker.py
#      This copies them into ./phoenix-data/ in one shot. Idempotent.
#   4. docker compose up --build
#   5. Open http://127.0.0.1:5000/ in your browser.
#
# Where does your data live?
#   On the host: ${PHOENIX_DATA_DIR:-./phoenix-data}/
#                (defaults to a subdirectory of the project, but you can point
#                it at /mnt/ebs/phoenix-data on EC2 and the image is unchanged)
#   In the container: /app/data/
#                (PHOENIX_DB_PATH, PHOENIX_DOWNLOADED_DIR, PHOENIX_LOG_DIR
#                all set to subpaths of /app/data in the Dockerfile)
#
# `docker compose down` stops the container. Data on the host stays.
# `docker compose down -v` does the same thing here (we use bind mounts,
#  not anonymous Docker volumes, so there's nothing for -v to delete).

services:
  phoenix:
    build: .
    image: phoenix:local
    container_name: phoenix

    # 127.0.0.1:5000 on the host stays bound only for local debugging /
    # smoke tests. The Caddy service (prod profile, below) reaches Phoenix
    # over the internal Docker network, NOT via this host port. So the
    # outside world can never hit Phoenix directly even on EC2.
    ports:
      - "127.0.0.1:5000:5000"

    networks:
      - phoenix-net

    # Runtime secrets / config for the container. Read AS-IS by Docker,
    # no variable substitution — so $ characters in your password hash are
    # safe and never need escaping.
    #
    # We deliberately do NOT use the conventional `.env` filename here.
    # Compose auto-loads `.env` for substitution INSIDE docker-compose.yml,
    # which is a separate (interpolated) pass and would mangle $ characters
    # in values. Two files = two purposes, no collisions.
    env_file:
      - .env.runtime

    # The ONLY persistent state: one host directory mounted at /app/data.
    # The default `./phoenix-data` sits next to the repo but outside the app
    # code. Override PHOENIX_DATA_DIR in .env or in your shell to point at
    # any host path you like (e.g. /mnt/ebs/phoenix-data on EC2).
    #
    # Note the LICENSE file is read-only mounted so /license can render it
    # even if you edit it on the host without rebuilding the image.
    volumes:
      - ${PHOENIX_DATA_DIR:-./phoenix-data}:/app/data
      - ./LICENSE:/app/LICENSE:ro

    restart: unless-stopped


  # -------------------------------------------------------------------------
  # Caddy reverse proxy — HTTPS termination + auto Let's Encrypt cert.
  # -------------------------------------------------------------------------
  # Only starts when the `prod` compose profile is active. To use:
  #   docker compose --profile prod up -d --build
  # Local dev runs without --profile, so Caddy stays off and you can keep
  # using http://127.0.0.1:5000/ without dealing with TLS.
  #
  # On EC2 the GitHub Actions workflow always uses --profile prod, so Caddy
  # is always on in production.
  #
  # Requires two env vars (set in the .env file at the project root):
  #   PHOENIX_DOMAIN   the fully-qualified subdomain (e.g. phoenix.latentia.ai)
  #   CADDY_EMAIL      email Let's Encrypt sends expiry warnings to
  # Both come from GitHub Secrets via the deploy workflow.
  caddy:
    image: caddy:2-alpine
    container_name: phoenix-caddy
    restart: unless-stopped
    profiles: [prod]

    ports:
      - "80:80"                     # HTTP — Caddy redirects to HTTPS
      - "443:443"                   # HTTPS
      - "443:443/udp"               # HTTP/3 over QUIC

    # Explicit DNS servers. Ubuntu hosts use 127.0.0.53 (systemd-resolved)
    # which Docker inherits into the container's resolv.conf but is NOT
    # reachable from inside the container's network namespace. Without this
    # override, Caddy cannot resolve acme-v02.api.letsencrypt.org to fetch
    # the TLS cert, and the deploy hangs in retry-loop forever.
    dns:
      - 8.8.8.8
      - 1.1.1.1

    environment:
      # Optional at parse time (so `docker compose ps` works locally without
      # prod env vars). If Caddy actually starts with PHOENIX_DOMAIN empty,
      # the Caddyfile will fail to load with a clearer runtime error than the
      # compose-parse error of `:?` would have produced.
      PHOENIX_DOMAIN: ${PHOENIX_DOMAIN:-}
      CADDY_EMAIL: ${CADDY_EMAIL:-}

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Docker-managed volumes so cert + config persist across container
      # restarts. If you ever lose them, Caddy just re-fetches from Let's
      # Encrypt on next startup (within their per-week rate limits).
      - caddy-data:/data
      - caddy-config:/config

    networks:
      - phoenix-net

    depends_on:
      - phoenix


volumes:
  caddy-data:
  caddy-config:


networks:
  # Both services share an internal Docker network so Caddy can reach
  # Phoenix by its service name ("phoenix:5000") without going through
  # the host's network stack.
  phoenix-net:
    driver: bridge

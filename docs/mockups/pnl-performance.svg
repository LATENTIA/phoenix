<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="1280" height="900" fill="#0f172a"/>

  <rect x="40" y="20" width="1200" height="22" rx="4" fill="rgba(250,204,21,0.1)" stroke="#facc15" stroke-dasharray="3 3"/>
  <text x="640" y="36" fill="#facc15" font-size="11" text-anchor="middle">📄 Illustrative mockup — all numbers, tickers and dates are fictional examples</text>

  <!-- Header -->
  <text x="40" y="84" fill="#e2e8f0" font-size="26" font-weight="700">Performance analysis — </text>
  <text x="378" y="84" fill="#38bdf8" font-size="26" font-weight="700">example</text>
  <rect x="510" y="62" width="56" height="22" rx="4" fill="#273449"/><text x="520" y="78" fill="#94a3b8" font-size="11">FIFO</text>
  <text x="40" y="108" fill="#94a3b8" font-size="13">Multi-year realized P&amp;L · sample data · all figures fictional</text>

  <!-- KPI row 1 -->
  <g transform="translate(40,128)">
    <g><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">TOTAL REALIZED P&amp;L (EUR)</text>
       <text x="16" y="58" fill="#4ade80" font-size="22" font-weight="700">+10,000.00</text></g>
    <g transform="translate(246,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">ROI ON BASIS</text>
       <text x="16" y="58" fill="#4ade80" font-size="22" font-weight="700">+15.00%</text></g>
    <g transform="translate(492,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">CLOSED TRADES</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">300</text></g>
    <g transform="translate(738,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">WIN RATE</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">58.0%</text></g>
    <g transform="translate(984,0)"><rect width="216" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">PROFIT FACTOR</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">1.40</text></g>
  </g>

  <!-- Equity curve -->
  <text x="40" y="248" fill="#94a3b8" font-size="11" letter-spacing="0.5" font-weight="600">EQUITY CURVE (CUMULATIVE REALIZED P&amp;L, EUR)</text>
  <rect x="40" y="262" width="1200" height="220" rx="10" fill="#1e293b" stroke="#334155"/>
  <g transform="translate(40,262)">
    <!-- Grid lines + y-axis labels -->
    <line x1="92" y1="42" x2="1192" y2="42" stroke="#334155" stroke-dasharray="2 4"/>
    <text x="84" y="46" fill="#94a3b8" font-size="10" text-anchor="end">10,000</text>
    <line x1="92" y1="118" x2="1192" y2="118" stroke="#334155" stroke-dasharray="2 4"/>
    <text x="84" y="122" fill="#94a3b8" font-size="10" text-anchor="end">3,000</text>
    <line x1="92" y1="170" x2="1192" y2="170" stroke="#334155" stroke-dasharray="2 4"/>
    <text x="84" y="174" fill="#94a3b8" font-size="10" text-anchor="end">0</text>
    <line x1="92" y1="204" x2="1192" y2="204" stroke="#334155" stroke-dasharray="2 4"/>
    <text x="84" y="208" fill="#94a3b8" font-size="10" text-anchor="end">−3,000</text>

    <!-- Area + line -->
    <path d="M 92,176 L 162,178 L 232,170 L 302,164 L 372,158 L 442,150 L 512,138 L 582,130 L 652,114 L 722,108 L 792,196 L 862,204 L 932,190 L 1002,178 L 1072,150 L 1122,114 L 1162,72 L 1192,42 L 1192,170 L 92,170 Z"
          fill="rgba(74,222,128,0.18)"/>
    <path d="M 92,176 L 162,178 L 232,170 L 302,164 L 372,158 L 442,150 L 512,138 L 582,130 L 652,114 L 722,108 L 792,196 L 862,204 L 932,190 L 1002,178 L 1072,150 L 1122,114 L 1162,72 L 1192,42"
          fill="none" stroke="#4ade80" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Drawdown markers -->
    <line x1="722" y1="108" x2="862" y2="108" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
    <line x1="862" y1="108" x2="862" y2="204" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="722" cy="108" r="4" fill="#94a3b8"/>
    <circle cx="862" cy="204" r="4" fill="#f87171"/>

    <text x="92" y="216" fill="#94a3b8" font-size="10">YYYY-MM-DD</text>
    <text x="1192" y="216" fill="#94a3b8" font-size="10" text-anchor="end">YYYY-MM-DD</text>
  </g>

  <!-- Drawdown KPI row -->
  <g transform="translate(40,500)">
    <g><rect width="396" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">MAX DRAWDOWN (EUR)</text>
       <text x="16" y="58" fill="#f87171" font-size="22" font-weight="700">−7,000.00</text></g>
    <g transform="translate(408,0)"><rect width="396" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">PEAK → TROUGH</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="16">YYYY-MM-DD → YYYY-MM-DD</text></g>
    <g transform="translate(816,0)"><rect width="384" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">RECOVERED</text>
       <text x="16" y="58" fill="#4ade80" font-size="22" font-weight="700">YYYY-MM-DD</text></g>
  </g>

  <!-- FX decomposition -->
  <text x="40" y="616" fill="#94a3b8" font-size="11" letter-spacing="0.5" font-weight="600">FX VS PRICE DECOMPOSITION</text>
  <rect x="40" y="628" width="580" height="232" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="40" y="628" width="580" height="32" fill="#273449"/>
  <g fill="#94a3b8" font-size="10" letter-spacing="0.4">
    <text x="56" y="648">YEAR</text>
    <text x="200" y="648">TOTAL</text>
    <text x="320" y="648">PRICE</text>
    <text x="430" y="648">FX</text>
    <text x="540" y="648">FX SHARE</text>
  </g>
  <g fill="#e2e8f0" font-size="12">
    <text x="56" y="690">YEAR 1</text><text x="200" y="690" fill="#4ade80" font-weight="700">+1,000</text><text x="320" y="690" fill="#4ade80">+900</text><text x="430" y="690" fill="#4ade80">+100</text><text x="540" y="690" fill="#94a3b8">+10.0%</text>
    <text x="56" y="722">YEAR 2</text><text x="200" y="722" fill="#f87171" font-weight="700">−2,000</text><text x="320" y="722" fill="#f87171">−2,200</text><text x="430" y="722" fill="#4ade80">+200</text><text x="540" y="722" fill="#94a3b8">−10.0%</text>
    <text x="56" y="754">YEAR 3</text><text x="200" y="754" fill="#4ade80" font-weight="700">+5,000</text><text x="320" y="754" fill="#4ade80">+6,000</text><text x="430" y="754" fill="#f87171">−1,000</text><text x="540" y="754" fill="#94a3b8">−20.0%</text>
    <text x="56" y="786">YEAR 4</text><text x="200" y="786" fill="#4ade80" font-weight="700">+6,000</text><text x="320" y="786" fill="#4ade80">+7,000</text><text x="430" y="786" fill="#f87171">−1,000</text><text x="540" y="786" fill="#94a3b8">−16.7%</text>
  </g>
  <text x="56" y="836" fill="#94a3b8" font-size="11">Splits each year's P&amp;L into price-driven vs FX-driven parts.</text>
  <text x="56" y="852" fill="#94a3b8" font-size="11">Total = Price + FX (Method 2: basis at buy-date rate, proceeds at sell-date rate).</text>

  <!-- Distribution histogram -->
  <text x="640" y="616" fill="#94a3b8" font-size="11" letter-spacing="0.5" font-weight="600">DISTRIBUTION OF TRADE OUTCOMES</text>
  <rect x="640" y="628" width="600" height="232" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="640" y="628" width="600" height="32" fill="#273449"/>
  <g fill="#94a3b8" font-size="10" letter-spacing="0.4">
    <text x="656" y="648">BUCKET</text>
    <text x="780" y="648">TRADES</text>
    <text x="880" y="648">TOTAL</text>
    <text x="1010" y="648">DISTRIBUTION</text>
  </g>
  <g fill="#e2e8f0" font-size="11">
    <text x="656" y="678">&lt; -50%</text><text x="780" y="678">120</text><text x="880" y="678" fill="#f87171">−15,000</text>
    <rect x="1010" y="671" width="180" height="10" rx="2" fill="rgba(248,113,113,0.45)"/>

    <text x="656" y="700">-50…-25%</text><text x="780" y="700">15</text><text x="880" y="700" fill="#f87171">−1,200</text>
    <rect x="1010" y="693" width="22" height="10" rx="2" fill="rgba(248,113,113,0.45)"/>

    <text x="656" y="722">-25…-10%</text><text x="780" y="722">20</text><text x="880" y="722" fill="#f87171">−400</text>
    <rect x="1010" y="715" width="29" height="10" rx="2" fill="rgba(248,113,113,0.45)"/>

    <text x="656" y="744">-10…0%</text><text x="780" y="744">15</text><text x="880" y="744" fill="#f87171">−100</text>
    <rect x="1010" y="737" width="22" height="10" rx="2" fill="rgba(248,113,113,0.45)"/>

    <text x="656" y="766">0…10%</text><text x="780" y="766">15</text><text x="880" y="766" fill="#4ade80">+100</text>
    <rect x="1010" y="759" width="22" height="10" rx="2" fill="rgba(74,222,128,0.45)"/>

    <text x="656" y="788">10…25%</text><text x="780" y="788">15</text><text x="880" y="788" fill="#4ade80">+500</text>
    <rect x="1010" y="781" width="22" height="10" rx="2" fill="rgba(74,222,128,0.45)"/>

    <text x="656" y="810">25…50%</text><text x="780" y="810">25</text><text x="880" y="810" fill="#4ade80">+2,000</text>
    <rect x="1010" y="803" width="32" height="10" rx="2" fill="rgba(74,222,128,0.45)"/>

    <text x="656" y="832">50…100%</text><text x="780" y="832">30</text><text x="880" y="832" fill="#4ade80">+5,000</text>
    <rect x="1010" y="825" width="44" height="10" rx="2" fill="rgba(74,222,128,0.45)"/>

    <text x="656" y="854">&gt; 100%</text><text x="780" y="854">45</text><text x="880" y="854" fill="#4ade80">+18,000</text>
    <rect x="1010" y="847" width="64" height="10" rx="2" fill="rgba(74,222,128,0.45)"/>
  </g>
</svg>

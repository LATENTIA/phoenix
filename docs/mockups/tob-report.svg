<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="1280" height="720" fill="#0f172a"/>

  <rect x="40" y="20" width="1200" height="22" rx="4" fill="rgba(250,204,21,0.1)" stroke="#facc15" stroke-dasharray="3 3"/>
  <text x="640" y="36" fill="#facc15" font-size="11" text-anchor="middle">📄 Illustrative mockup — all numbers, tickers and dates are fictional examples</text>

  <!-- Header -->
  <text x="40" y="84" fill="#e2e8f0" font-size="22" font-weight="700">Trade Statement — </text>
  <text x="305" y="84" fill="#38bdf8" font-size="22" font-weight="700">example</text>
  <text x="40" y="104" fill="#94a3b8" font-size="13">YTD 2026 · 2026-01-01 → 2026-XX-XX</text>
  <text x="1240" y="84" fill="#94a3b8" font-size="12" text-anchor="end">Generated by IBKR: 2026-XX-XX HH:MM:SS</text>
  <text x="1240" y="100" fill="#94a3b8" font-size="12" text-anchor="end">Report built: 2026-XX-XX HH:MM:SS</text>

  <!-- KPI cards -->
  <g transform="translate(40,128)">
    <g><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">SELECTED TRANSACTIONS</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">50</text></g>
    <g transform="translate(246,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">UNIQUE SYMBOLS</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">15</text></g>
    <g transform="translate(492,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">TOTAL AMOUNT (EUR)</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">40,000.00</text></g>
    <g transform="translate(738,0)"><rect width="234" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">IB COMMISSIONS (USD)</text>
       <text x="16" y="58" fill="#e2e8f0" font-size="22" font-weight="700">75.00</text></g>
    <g transform="translate(984,0)">
      <rect width="216" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
      <line x1="0" y1="0" x2="0" y2="78" stroke="#facc15" stroke-width="3"/>
      <text x="16" y="24" fill="#94a3b8" font-size="11" letter-spacing="0.5">TOB DUE (EUR)</text>
      <text x="16" y="58" fill="#facc15" font-size="22" font-weight="700">140.00</text></g>
  </g>

  <!-- Year picker -->
  <rect x="40" y="232" width="1200" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="56" y="258" fill="#94a3b8" font-size="12">Quick select:</text>
  <g font-size="12">
    <rect x="142" y="240" width="106" height="28" rx="5" fill="transparent" stroke="#334155"/><text x="160" y="258" fill="#94a3b8">Last 2 months</text>
    <rect x="256" y="240" width="56" height="28" rx="5" fill="transparent" stroke="#334155"/><text x="276" y="258" fill="#94a3b8">2024</text>
    <rect x="320" y="240" width="56" height="28" rx="5" fill="transparent" stroke="#334155"/><text x="340" y="258" fill="#94a3b8">2025</text>
    <rect x="384" y="240" width="56" height="28" rx="5" fill="#38bdf8"/><text x="404" y="258" fill="#0f172a" font-weight="700">2026</text>
    <rect x="448" y="240" width="76" height="28" rx="5" fill="transparent" stroke="#334155"/><text x="468" y="258" fill="#94a3b8">All years</text>
  </g>

  <!-- Filters -->
  <rect x="40" y="284" width="1200" height="44" rx="8" fill="#1e293b" stroke="#334155"/>
  <g font-size="12" fill="#94a3b8">
    <text x="56" y="310">From</text>
    <rect x="92" y="294" width="116" height="24" rx="4" fill="#273449" stroke="#334155"/>
    <text x="100" y="310" fill="#e2e8f0">2026-01-01</text>

    <text x="226" y="310">To</text>
    <rect x="248" y="294" width="116" height="24" rx="4" fill="#273449" stroke="#334155"/>
    <text x="256" y="310" fill="#e2e8f0">2026-12-31</text>

    <text x="382" y="310">Symbol</text>
    <rect x="430" y="294" width="160" height="24" rx="4" fill="#273449" stroke="#334155"/>
    <text x="438" y="310">e.g. STOCK_A</text>

    <text x="606" y="310">Asset</text>
    <rect x="646" y="294" width="120" height="24" rx="4" fill="#273449" stroke="#334155"/>
    <text x="654" y="310" fill="#e2e8f0">All ▾</text>

    <rect x="780" y="294" width="100" height="24" rx="4" fill="#38bdf8"/>
    <text x="800" y="310" fill="#0f172a" font-weight="700">Apply range</text>
  </g>

  <!-- Transactions table -->
  <rect x="40" y="346" width="1200" height="332" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="40" y="346" width="1200" height="32" fill="#273449"/>
  <g fill="#94a3b8" font-size="10" letter-spacing="0.4">
    <text x="56" y="366">TRADE DATE</text>
    <text x="190" y="366">SYMBOL</text>
    <text x="290" y="366">SIDE</text>
    <text x="390" y="366">QTY</text>
    <text x="490" y="366">PRICE (USD)</text>
    <text x="640" y="366">PROCEEDS (USD)</text>
    <text x="800" y="366">EUR/USD</text>
    <text x="930" y="366">TOTAL (EUR)</text>
    <text x="1100" y="366">TOB (EUR)</text>
  </g>
  <g fill="#e2e8f0" font-size="12" font-variant-numeric="tabular-nums">
    <text x="56" y="402">YYYY-MM-DD</text><text x="190" y="402">STOCK_A</text><text x="290" y="402" fill="#4ade80" font-weight="700">BUY</text><text x="390" y="402">10</text><text x="490" y="402">100.00</text><text x="640" y="402">−1,000.00</text><text x="800" y="402">1.0900</text><text x="930" y="402">917.43</text><text x="1100" y="402">3.21</text>
    <text x="56" y="430">YYYY-MM-DD</text><text x="190" y="430">STOCK_A</text><text x="290" y="430" fill="#f87171" font-weight="700">SELL</text><text x="390" y="430">10</text><text x="490" y="430">110.00</text><text x="640" y="430">1,100.00</text><text x="800" y="430">1.0900</text><text x="930" y="430">1,009.17</text><text x="1100" y="430">3.53</text>
    <text x="56" y="458">YYYY-MM-DD</text><text x="190" y="458">STOCK_B</text><text x="290" y="458" fill="#4ade80" font-weight="700">BUY</text><text x="390" y="458">100</text><text x="490" y="458">25.00</text><text x="640" y="458">−2,500.00</text><text x="800" y="458">1.0900</text><text x="930" y="458">2,293.58</text><text x="1100" y="458">8.03</text>
    <text x="56" y="486">YYYY-MM-DD</text><text x="190" y="486">STOCK_B</text><text x="290" y="486" fill="#f87171" font-weight="700">SELL</text><text x="390" y="486">100</text><text x="490" y="486">28.00</text><text x="640" y="486">2,800.00</text><text x="800" y="486">1.0900</text><text x="930" y="486">2,568.81</text><text x="1100" y="486">8.99</text>
    <text x="56" y="514">YYYY-MM-DD</text><text x="190" y="514">STOCK_C</text><text x="290" y="514" fill="#4ade80" font-weight="700">BUY</text><text x="390" y="514">25</text><text x="490" y="514">200.00</text><text x="640" y="514">−5,000.00</text><text x="800" y="514">1.0900</text><text x="930" y="514">4,587.16</text><text x="1100" y="514">16.06</text>
    <text x="56" y="542">YYYY-MM-DD</text><text x="190" y="542">STOCK_C</text><text x="290" y="542" fill="#f87171" font-weight="700">SELL</text><text x="390" y="542">25</text><text x="490" y="542">220.00</text><text x="640" y="542">5,500.00</text><text x="800" y="542">1.0900</text><text x="930" y="542">5,045.87</text><text x="1100" y="542">17.66</text>
    <text x="56" y="570">YYYY-MM-DD</text><text x="190" y="570">STOCK_D</text><text x="290" y="570" fill="#4ade80" font-weight="700">BUY</text><text x="390" y="570">50</text><text x="490" y="570">75.00</text><text x="640" y="570">−3,750.00</text><text x="800" y="570">1.0900</text><text x="930" y="570">3,440.37</text><text x="1100" y="570">12.04</text>
    <text x="56" y="598">YYYY-MM-DD</text><text x="190" y="598">STOCK_D</text><text x="290" y="598" fill="#f87171" font-weight="700">SELL</text><text x="390" y="598">50</text><text x="490" y="598">85.00</text><text x="640" y="598">4,250.00</text><text x="800" y="598">1.0900</text><text x="930" y="598">3,899.08</text><text x="1100" y="598">13.65</text>
  </g>
  <text x="640" y="660" fill="#94a3b8" font-size="11" font-style="italic" text-anchor="middle">… N more transactions …</text>
</svg>

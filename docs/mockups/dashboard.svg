<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0f172a"/>

  <!-- Title bar -->
  <text x="40" y="48" fill="#e2e8f0" font-size="28" font-weight="700">📈 Phoenix</text>
  <rect x="200" y="28" width="280" height="26" rx="4" fill="#273449"/>
  <text x="212" y="46" fill="#94a3b8" font-size="12">your IBKR tax &amp; P&amp;L companion</text>
  <text x="40" y="76" fill="#94a3b8" font-size="13">A local web dashboard for Belgian traders using Interactive Brokers — runs on your machine, no data leaves it.</text>

  <!-- Account bar -->
  <line x1="40" y1="120" x2="1240" y2="120" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="100" width="160" height="34" rx="6" fill="#1e293b"/>
  <text x="60" y="122" fill="#38bdf8" font-size="14" font-weight="600">👤 personal</text>
  <text x="220" y="122" fill="#94a3b8" font-size="14">🏢 business</text>
  <text x="1140" y="122" fill="#94a3b8" font-size="14">＋ Add account</text>

  <!-- Action card -->
  <rect x="40" y="156" width="1200" height="78" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="56" y="174" width="148" height="36" rx="6" fill="#38bdf8"/>
  <text x="78" y="198" fill="#0f172a" font-size="14" font-weight="700">⚡ Load data</text>
  <text x="220" y="198" fill="#94a3b8" font-size="13">Download → ingest into DB → regenerate TOB &amp; P&amp;L</text>
  <rect x="892" y="174" width="216" height="36" rx="6" fill="#273449" stroke="#334155"/>
  <text x="906" y="198" fill="#e2e8f0" font-size="13">📊 Refresh year-end marks</text>
  <rect x="1120" y="174" width="104" height="36" rx="6" fill="transparent" stroke="#f87171"/>
  <text x="1140" y="198" fill="#f87171" font-size="13">🗑 Empty DB</text>
  <text x="56" y="226" fill="#94a3b8" font-size="12">Last ingest: example_statement.xml · 2 minutes ago</text>

  <!-- Tabs -->
  <line x1="40" y1="300" x2="1240" y2="300" stroke="#334155"/>
  <text x="60" y="294" fill="#94a3b8" font-size="14">TOB</text>
  <text x="124" y="294" fill="#94a3b8" font-size="14">P&amp;L</text>
  <text x="188" y="294" fill="#94a3b8" font-size="14">Performance</text>
  <text x="312" y="294" fill="#38bdf8" font-size="14" font-weight="700">CGT 2026+</text>
  <line x1="304" y1="300" x2="408" y2="300" stroke="#38bdf8" stroke-width="2"/>

  <!-- Viewer -->
  <rect x="40" y="320" width="1200" height="380" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="64" y="354" fill="#e2e8f0" font-size="18" font-weight="600">Belgian Capital Gains Tax — example</text>
  <rect x="510" y="338" width="56" height="20" rx="4" fill="#273449"/><text x="518" y="353" fill="#94a3b8" font-size="11">FIFO</text>
  <rect x="572" y="338" width="148" height="20" rx="4" fill="#273449"/><text x="580" y="353" fill="#94a3b8" font-size="11">10% from 2026-01-01</text>

  <!-- KPI cards row -->
  <g transform="translate(64,376)">
    <!-- card 1 -->
    <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
    <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">TAXABLE YEARS</text>
    <text x="14" y="58" fill="#e2e8f0" font-size="22" font-weight="700">1</text>

    <g transform="translate(196,0)">
      <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">TOTAL NET (EUR)</text>
      <text x="14" y="58" fill="#4ade80" font-size="22" font-weight="700">+15,000.00</text>
    </g>
    <g transform="translate(392,0)">
      <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">EXEMPTION USED</text>
      <text x="14" y="58" fill="#e2e8f0" font-size="22" font-weight="700">10,000.00</text>
    </g>
    <g transform="translate(588,0)">
      <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">TAXABLE (EUR)</text>
      <text x="14" y="58" fill="#e2e8f0" font-size="22" font-weight="700">5,000.00</text>
    </g>
    <g transform="translate(784,0)">
      <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">TAX DUE (EUR)</text>
      <text x="14" y="58" fill="#f87171" font-size="22" font-weight="700">500.00</text>
    </g>
    <g transform="translate(980,0)">
      <rect width="180" height="76" rx="8" fill="#273449" stroke="#334155"/>
      <text x="14" y="22" fill="#94a3b8" font-size="10" letter-spacing="0.5">CARRY-FORWARD</text>
      <text x="14" y="58" fill="#e2e8f0" font-size="22" font-weight="700">0.00</text>
    </g>
  </g>

  <!-- Annual table preview -->
  <text x="64" y="490" fill="#94a3b8" font-size="11" letter-spacing="0.5" font-weight="600">PER-YEAR TAX COMPUTATION</text>
  <rect x="64" y="500" width="1152" height="140" rx="8" fill="#0f172a" stroke="#334155"/>
  <!-- Header row -->
  <rect x="64" y="500" width="1152" height="32" fill="#273449"/>
  <g fill="#94a3b8" font-size="10" letter-spacing="0.4">
    <text x="80" y="520">YEAR</text>
    <text x="180" y="520">GAINS</text>
    <text x="320" y="520">LOSSES</text>
    <text x="460" y="520">NET</text>
    <text x="600" y="520">CARRY IN</text>
    <text x="740" y="520">EXEMPTION USED</text>
    <text x="900" y="520">TAXABLE</text>
    <text x="1060" y="520">TAX @ 10%</text>
  </g>
  <!-- Data row -->
  <g fill="#e2e8f0" font-size="13" font-variant-numeric="tabular-nums">
    <text x="80" y="560">2026</text>
    <text x="180" y="560" fill="#4ade80">+20,000.00</text>
    <text x="320" y="560" fill="#f87171">−5,000.00</text>
    <text x="460" y="560" fill="#4ade80" font-weight="700">+15,000.00</text>
    <text x="600" y="560" fill="#94a3b8">0.00</text>
    <text x="740" y="560">10,000.00</text>
    <text x="900" y="560">5,000.00</text>
    <text x="1060" y="560" fill="#f87171" font-weight="700">500.00</text>
  </g>
  <text x="80" y="610" fill="#94a3b8" font-size="11">Net gain after losses cancel out → exemption applied → 10% on the remainder.</text>
  <text x="80" y="626" fill="#94a3b8" font-size="11">Every step shown so an accountant can verify the math.</text>

  <!-- Mockup banner -->
  <rect x="40" y="678" width="1200" height="22" rx="4" fill="rgba(250,204,21,0.1)" stroke="#facc15" stroke-dasharray="3 3"/>
  <text x="640" y="694" fill="#facc15" font-size="11" text-anchor="middle">📄 Illustrative mockup — all numbers, tickers and dates are fictional examples</text>
</svg>

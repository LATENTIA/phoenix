<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="1280" height="900" fill="#0f172a"/>

  <!-- Illustrative banner -->
  <rect x="40" y="20" width="1200" height="22" rx="4" fill="rgba(250,204,21,0.1)" stroke="#facc15" stroke-dasharray="3 3"/>
  <text x="640" y="36" fill="#facc15" font-size="11" text-anchor="middle">📄 Illustrative mockup. All numbers, tickers and dates are fictional examples.</text>

  <!-- Header -->
  <text x="40" y="84" fill="#e2e8f0" font-size="26" font-weight="700">Dividends, </text>
  <text x="170" y="84" fill="#38bdf8" font-size="26" font-weight="700">example</text>
  <rect x="304" y="62" width="190" height="22" rx="4" fill="#273449"/>
  <text x="314" y="78" fill="#94a3b8" font-size="11">Belgian €833 exemption</text>
  <rect x="500" y="62" width="148" height="22" rx="4" fill="#273449"/>
  <text x="510" y="78" fill="#94a3b8" font-size="11">BE-US treaty 15%</text>
  <text x="40" y="108" fill="#94a3b8" font-size="13">Report built: 2026-XX-XX HH:MM:SS · FX from ECB EUR/USD daily reference rates · Capital events auto-excluded</text>

  <!-- KPI cards row 1 (5 cards) -->
  <g transform="translate(40,128)">
    <g><rect width="232" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">YEARS WITH DIVIDENDS</text>
       <text x="16" y="64" fill="#e2e8f0" font-size="24" font-weight="700">5</text></g>
    <g transform="translate(244,0)"><rect width="232" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">TOTAL PAYMENTS</text>
       <text x="16" y="64" fill="#e2e8f0" font-size="24" font-weight="700">86</text></g>
    <g transform="translate(488,0)"><rect width="232" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">GROSS DIVIDENDS (EUR)</text>
       <text x="16" y="64" fill="#4ade80" font-size="22" font-weight="700">3,250.00</text></g>
    <g transform="translate(732,0)"><rect width="232" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">FOREIGN WHT PAID (EUR)</text>
       <text x="16" y="64" fill="#f87171" font-size="22" font-weight="700">−487.50</text></g>
    <g transform="translate(976,0)"><rect width="224" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">NET RECEIVED (EUR)</text>
       <text x="16" y="64" fill="#e2e8f0" font-size="22" font-weight="700">2,762.50</text></g>
  </g>

  <!-- KPI cards row 2 (4 cards, larger) -->
  <g transform="translate(40,224)">
    <g><rect width="291" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">EXEMPTED (EUR)</text>
       <text x="16" y="64" fill="#4ade80" font-size="22" font-weight="700">2,933.00</text></g>
    <g transform="translate(303,0)"><rect width="291" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">ESTIMATED BELGIAN TAX (EUR)</text>
       <text x="16" y="64" fill="#f87171" font-size="22" font-weight="700">−80.84</text></g>
    <g transform="translate(606,0)"><rect width="291" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">SAVED BY EXEMPTION (EUR)</text>
       <text x="16" y="64" fill="#4ade80" font-size="22" font-weight="700">747.91</text></g>
    <g transform="translate(909,0)"><rect width="291" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
       <text x="16" y="26" fill="#94a3b8" font-size="11" letter-spacing="0.5">AFTER ALL TAXES (EUR)</text>
       <text x="16" y="64" fill="#e2e8f0" font-size="22" font-weight="700">2,681.66</text></g>
  </g>

  <!-- Rules box -->
  <rect x="40" y="328" width="1200" height="142" rx="6" fill="#1e293b" stroke="#334155"/>
  <line x1="40" y1="328" x2="40" y2="470" stroke="#38bdf8" stroke-width="3"/>
  <text x="56" y="352" fill="#e2e8f0" font-size="13" font-weight="700">Belgian dividend tax, how this report computes it (income year 2026):</text>
  <g fill="#e2e8f0" font-size="12">
    <text x="68" y="376">• <tspan font-weight="700">Foreign WHT</tspan> (e.g. 15% on US dividends under the BE-US treaty when W-8BEN is filed) is taken at source by the broker</text>
    <text x="68" y="394">• <tspan font-weight="700">Belgian "précompte mobilier" 30%</tspan> applies to the dividend net of foreign WHT. IBKR is foreign so it does NOT withhold for you</text>
    <text x="68" y="412">• <tspan font-weight="700">Annual exemption €833</tspan> per taxpayer. The first €833 of ordinary foreign dividends is excluded from declaration; matching foreign WHT also drops out</text>
    <text x="68" y="430">• <tspan font-weight="700">Capital events auto-excluded</tspan>: InterimLiquidation, LiquidationDividend, Return of Capital, Capital Gains Distribution. Already netted on the CGT side</text>
    <text x="68" y="448">• EUR amounts use the <tspan font-weight="700">ECB EUR/USD reference rate</tspan> on each payment date (FX-accurate)</text>
  </g>

  <!-- Tabs -->
  <line x1="40" y1="510" x2="1240" y2="510" stroke="#334155"/>
  <text x="60" y="504" fill="#38bdf8" font-size="13" font-weight="700">By year</text>
  <line x1="50" y1="510" x2="118" y2="510" stroke="#38bdf8" stroke-width="2"/>
  <text x="142" y="504" fill="#94a3b8" font-size="13">By symbol</text>
  <text x="234" y="504" fill="#94a3b8" font-size="13">Per payment</text>
  <text x="338" y="504" fill="#94a3b8" font-size="13">Sources</text>
  <text x="416" y="504" fill="#94a3b8" font-size="13">Rules &amp; References</text>

  <!-- Section heading -->
  <text x="40" y="540" fill="#e2e8f0" font-size="15" font-weight="700">Per-year dividend summary</text>
  <text x="40" y="558" fill="#94a3b8" font-size="11">Net = Gross − foreign WHT. The first €833 of ordinary dividends per year is exempt (declared as 0). Belgian tax = remaining net × 30%.</text>

  <!-- Annual table -->
  <rect x="40" y="572" width="1200" height="246" rx="8" fill="#1e293b" stroke="#334155"/>
  <rect x="40" y="572" width="1200" height="32" fill="#273449"/>
  <g fill="#94a3b8" font-size="10" letter-spacing="0.4">
    <text x="56"   y="592">YEAR</text>
    <text x="120"  y="592">PAYMENTS</text>
    <text x="208"  y="592">SYMBOLS</text>
    <text x="320"  y="592" text-anchor="end">GROSS (EUR)</text>
    <text x="436"  y="592" text-anchor="end">WHT (EUR)</text>
    <text x="546"  y="592" text-anchor="end">NET (EUR)</text>
    <text x="700"  y="592" text-anchor="end">EXEMPTED / CAP</text>
    <text x="836"  y="592" text-anchor="end">EST. BE TAX</text>
    <text x="978"  y="592" text-anchor="end">AFTER ALL TAX</text>
    <text x="1170" y="592" text-anchor="end">GROSS (USD REF.)</text>
  </g>

  <!-- Row: 2022 -->
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="628">2022</text>
    <text x="120"  y="628" fill="#94a3b8">4</text>
    <text x="208"  y="628" fill="#94a3b8">3</text>
    <text x="320"  y="628" text-anchor="end">120.00</text>
    <text x="436"  y="628" text-anchor="end" fill="#f87171">−18.00</text>
    <text x="546"  y="628" text-anchor="end">102.00</text>
    <text x="700"  y="628" text-anchor="end" fill="#4ade80">120.00 / 800</text>
    <text x="836"  y="628" text-anchor="end" fill="#94a3b8">0.00</text>
    <text x="978"  y="628" text-anchor="end" font-weight="700">102.00</text>
    <text x="1170" y="628" text-anchor="end" fill="#94a3b8">132.00</text>
  </g>
  <line x1="40" y1="640" x2="1240" y2="640" stroke="#334155"/>

  <!-- Row: 2023 -->
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="660">2023</text>
    <text x="120"  y="660" fill="#94a3b8">16</text>
    <text x="208"  y="660" fill="#94a3b8">7</text>
    <text x="320"  y="660" text-anchor="end">620.00</text>
    <text x="436"  y="660" text-anchor="end" fill="#f87171">−93.00</text>
    <text x="546"  y="660" text-anchor="end">527.00</text>
    <text x="700"  y="660" text-anchor="end" fill="#4ade80">620.00 / 833</text>
    <text x="836"  y="660" text-anchor="end" fill="#94a3b8">0.00</text>
    <text x="978"  y="660" text-anchor="end" font-weight="700">527.00</text>
    <text x="1170" y="660" text-anchor="end" fill="#94a3b8">689.50</text>
  </g>
  <line x1="40" y1="672" x2="1240" y2="672" stroke="#334155"/>

  <!-- Row: 2024 -->
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="692">2024</text>
    <text x="120"  y="692" fill="#94a3b8">22</text>
    <text x="208"  y="692" fill="#94a3b8">9</text>
    <text x="320"  y="692" text-anchor="end">800.00</text>
    <text x="436"  y="692" text-anchor="end" fill="#f87171">−120.00</text>
    <text x="546"  y="692" text-anchor="end">680.00</text>
    <text x="700"  y="692" text-anchor="end" fill="#4ade80">800.00 / 833</text>
    <text x="836"  y="692" text-anchor="end" fill="#94a3b8">0.00</text>
    <text x="978"  y="692" text-anchor="end" font-weight="700">680.00</text>
    <text x="1170" y="692" text-anchor="end" fill="#94a3b8">876.00</text>
  </g>
  <line x1="40" y1="704" x2="1240" y2="704" stroke="#334155"/>

  <!-- Row: 2025 (over the cap, shows partial exemption math) -->
  <rect x="40" y="704" width="1200" height="32" fill="rgba(250,204,21,0.05)"/>
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="724">2025</text>
    <text x="120"  y="724" fill="#94a3b8">26</text>
    <text x="208"  y="724" fill="#94a3b8">12</text>
    <text x="320"  y="724" text-anchor="end">1,150.00</text>
    <text x="436"  y="724" text-anchor="end" fill="#f87171">−172.50</text>
    <text x="546"  y="724" text-anchor="end">977.50</text>
    <text x="700"  y="724" text-anchor="end" fill="#facc15">833.00 / 833</text>
    <text x="836"  y="724" text-anchor="end" fill="#f87171">−80.84</text>
    <text x="978"  y="724" text-anchor="end" font-weight="700">896.66</text>
    <text x="1170" y="724" text-anchor="end" fill="#94a3b8">1,250.50</text>
  </g>
  <line x1="40" y1="736" x2="1240" y2="736" stroke="#334155"/>

  <!-- Row: 2026 YTD -->
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="756">2026</text>
    <text x="120"  y="756" fill="#94a3b8">18</text>
    <text x="208"  y="756" fill="#94a3b8">8</text>
    <text x="320"  y="756" text-anchor="end">560.00</text>
    <text x="436"  y="756" text-anchor="end" fill="#f87171">−84.00</text>
    <text x="546"  y="756" text-anchor="end">476.00</text>
    <text x="700"  y="756" text-anchor="end" fill="#4ade80">560.00 / 833</text>
    <text x="836"  y="756" text-anchor="end" fill="#94a3b8">0.00</text>
    <text x="978"  y="756" text-anchor="end" font-weight="700">476.00</text>
    <text x="1170" y="756" text-anchor="end" fill="#94a3b8">609.40</text>
  </g>
  <line x1="40" y1="768" x2="1240" y2="768" stroke="#334155"/>

  <!-- Totals row -->
  <rect x="40" y="768" width="1200" height="36" fill="#273449"/>
  <g fill="#e2e8f0" font-size="12">
    <text x="56"   y="790" fill="#94a3b8" font-size="11" letter-spacing="0.4">TOTAL</text>
    <text x="120"  y="790" font-weight="700">86</text>
    <text x="208"  y="790" font-weight="700">·</text>
    <text x="320"  y="790" text-anchor="end" font-weight="700">3,250.00</text>
    <text x="436"  y="790" text-anchor="end" fill="#f87171" font-weight="700">−487.50</text>
    <text x="546"  y="790" text-anchor="end" font-weight="700">2,762.50</text>
    <text x="700"  y="790" text-anchor="end" fill="#4ade80" font-weight="700">2,933.00</text>
    <text x="836"  y="790" text-anchor="end" fill="#f87171" font-weight="700">−80.84</text>
    <text x="978"  y="790" text-anchor="end" font-weight="700">2,681.66</text>
    <text x="1170" y="790" text-anchor="end" fill="#94a3b8">3,557.40</text>
  </g>

  <!-- Highlight callout for 2025 (over-the-cap year) -->
  <rect x="40" y="828" width="1200" height="40" rx="6" fill="rgba(250,204,21,0.06)" stroke="rgba(250,204,21,0.4)"/>
  <text x="60" y="852" fill="#e2e8f0" font-size="12">
    <tspan fill="#facc15" font-weight="700">2025 hits the cap.</tspan>
    Gross €1,150.00 exceeds the €833 exemption, so €833 is excluded from declaration; the remaining €317 (proportional WHT removed) is taxed at 30%
    <tspan fill="#f87171"> = €80.84 Belgian tax</tspan>. Saved by exemption: <tspan fill="#4ade80" font-weight="700">€212.41</tspan> vs the no-exemption baseline.
  </text>

  <text x="640" y="888" fill="#94a3b8" font-size="11" text-anchor="middle">RGTPQ InterimLiquidation, ETF / UCITS distributions and Payment-in-Lieu rows are surfaced separately and not counted as taxable dividends here.</text>
</svg>

name: Deploy to EC2

# When this fires:
#   - Every push to `main`.
#   - Manual run from the Actions tab (workflow_dispatch).
#
# What it does, in order:
#   1. rsync the source code to the EC2 instance.
#      Excludes anything sensitive or user-generated: .env*, .git, data.db,
#      downloaded/, logs/, phoenix-data/. Those either don't exist in CI or
#      live on the EC2 host already and must not be overwritten.
#   2. Re-render /home/.../phoenix/.env.runtime on EC2 from GitHub Secrets.
#      $ characters in the auth hash are escaped to $$ before writing so
#      Docker Compose interpolation doesn't mangle them.
#   3. Ensure the persistent data directory exists on EC2 (chowned to UID 1000
#      which matches the `phoenix` user inside the container).
#   4. `docker compose up -d --build` — rebuilds the image with the new code
#      and restarts the container. The bind-mounted data dir is reattached
#      to the new container automatically, so trade history, accounts,
#      withholdings, etc. all survive the redeploy untouched.
#
# Data-protection guarantee:
#   The directory referenced by PHOENIX_DATA_DIR on the EC2 host (default
#   /var/phoenix-data) is NEVER written to or deleted by this workflow.
#   It's bind-mounted into the container's /app/data at runtime. Container
#   recreate → bind mount reattaches → data is exactly where it was.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't let two concurrent deploys race. Queue them instead of cancelling.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + restart Phoenix on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Optional: tie this to a "production" GitHub Environment so you can add a
    # required-reviewer protection rule later. Comment out if not using one.
    # environment: production

    env:
      # Where the source lives on the EC2 box. Stays inside the deploy user's
      # home dir; the persistent data dir is elsewhere (see PHOENIX_DATA_DIR).
      DEPLOY_DIR: /home/${{ secrets.EC2_USER }}/phoenix

    steps:
      # ----- 1. Get the code -----
      - name: Checkout
        uses: actions/checkout@v4

      # ----- 1b. Preflight: fail fast with actionable errors -----
      # Without this, missing/empty secrets or a stripped binary in the runner
      # surface as a generic `exit code 1` in some later step. Validating
      # everything up front means failures point straight at the cause.
      - name: Preflight checks
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          # Required secrets must be present and non-empty.
          [ -n "${EC2_HOST:-}" ]    || { echo "FAIL: missing GitHub Secret EC2_HOST";    exit 2; }
          [ -n "${EC2_USER:-}" ]    || { echo "FAIL: missing GitHub Secret EC2_USER";    exit 2; }
          [ -n "${EC2_SSH_KEY:-}" ] || { echo "FAIL: missing GitHub Secret EC2_SSH_KEY"; exit 2; }

          # Required tools on the runner. ubuntu-latest ships all three but a
          # future change of runner image could break us silently otherwise.
          command -v ssh   >/dev/null || { echo "FAIL: ssh not found on runner";   exit 2; }
          command -v scp   >/dev/null || { echo "FAIL: scp not found on runner";   exit 2; }
          command -v rsync >/dev/null || { echo "FAIL: rsync not found on runner"; exit 2; }

          echo "Preflight OK: all required secrets and tools present."

      # ----- 2. Set up SSH from the secret key + verify connectivity -----
      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Normalize possible CRLF in pasted PEM (common when the secret value
          # is copy-pasted from a Windows terminal or PowerShell output).
          # ssh refuses keys with CRLF line endings — the file looks valid but
          # `ssh -i` errors with "Permissions ... are too open" or just rejects
          # the key silently.
          printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Deterministic known_hosts entry. The timeout prevents hangs if the
          # remote host stops responding mid-scan. Removed `2>/dev/null` so we
          # see the actual error if scanning fails.
          ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts

          # Connectivity / authentication probe. BatchMode=yes refuses any
          # password prompt (which would otherwise hang the runner indefinitely
          # while waiting for stdin that never comes). If this fails, the
          # remaining deploy steps would all fail in confusing ways — better
          # to surface the SSH problem here, once, with a clear message.
          ssh -o BatchMode=yes \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=yes \
              -i ~/.ssh/deploy_key \
              "$EC2_USER@$EC2_HOST" \
              'echo SSH OK from $(hostname)'

      # ----- 3. Sync source to EC2 (preserve user data) -----
      - name: Rsync source to EC2
        run: |
          # --delete removes files on EC2 that no longer exist in the repo
          # (e.g. a deleted module). But the --exclude patterns make sure
          # user data and local config never get touched by --delete either.
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.venv/' \
            --exclude='.claude/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.idea/' \
            --exclude='.vscode/' \
            --exclude='phoenix-data/' \
            --exclude='data.db' \
            --exclude='data.db-*' \
            --exclude='downloaded/' \
            --exclude='logs/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='requested.txt' \
            --exclude='*.bak' \
            --exclude='docker-compose.override.yml' \
            --exclude='docker-compose.override.yaml' \
            --exclude='docker-compose.local.yml' \
            --exclude='docker-compose.local.yaml' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$DEPLOY_DIR/"

      # ----- 4. Render .env.runtime on EC2 from GitHub Secrets -----
      # GitHub Secrets store the RAW values (single $ in the hash). We escape
      # them here so Docker Compose's env_file interpolation doesn't eat
      # anything. Doing it in Python avoids bash/shell escaping pitfalls.
      - name: Render .env.runtime
        env:
          PHX_USER:    ${{ secrets.PHOENIX_AUTH_USER }}
          PHX_HASH:    ${{ secrets.PHOENIX_AUTH_PASS_HASH }}
          PHX_KEY:     ${{ secrets.PHOENIX_SECRET_KEY }}
          PHX_DATA:    ${{ secrets.PHOENIX_DATA_DIR }}
          PHX_BACKEND: ${{ secrets.PHOENIX_SECRETS_BACKEND }}
        run: |
          python3 <<'PY' > .env.runtime.tmp
          import os, sys

          def esc(v: str) -> str:
              # Docker Compose treats $ as variable substitution in env_file
              # values. Double it so the literal $ survives to the container.
              return (v or "").replace("$", "$$")

          required = ("PHX_USER", "PHX_HASH", "PHX_KEY")
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              print(
                  f"ERROR: GitHub Secrets missing: {', '.join(missing)}. "
                  "Add them in repo Settings → Secrets and variables → Actions.",
                  file=sys.stderr,
              )
              sys.exit(2)

          lines = [
              f"PHOENIX_AUTH_USER={os.environ['PHX_USER']}",
              f"PHOENIX_AUTH_PASS_HASH={esc(os.environ['PHX_HASH'])}",
              f"PHOENIX_SECRET_KEY={esc(os.environ['PHX_KEY'])}",
              f"PHOENIX_DATA_DIR={os.environ.get('PHX_DATA') or '/var/phoenix-data'}",
              f"PHOENIX_SECRETS_BACKEND={os.environ.get('PHX_BACKEND') or 'plaintext'}",
          ]
          print("\n".join(lines))
          PY

          # Upload over SSH with restrictive permissions, then wipe the local copy.
          scp -i ~/.ssh/deploy_key .env.runtime.tmp \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$DEPLOY_DIR/.env.runtime"
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod 600 $DEPLOY_DIR/.env.runtime"
          rm .env.runtime.tmp

          # ALSO write a project-root .env file with compose-interpolation
          # vars (PHOENIX_DATA_DIR, PHOENIX_DOMAIN, CADDY_EMAIL).
          # docker-compose's ${VAR} interpolation at yaml-parse time reads
          # from the shell env or this auto-loaded .env file — NOT from
          # env_file (.env.runtime). Without this, the bind mount falls
          # back to ./phoenix-data and the Caddy service can't start.
          DATA_DIR="${{ secrets.PHOENIX_DATA_DIR }}"
          DATA_DIR="${DATA_DIR:-/var/phoenix-data}"
          DOMAIN="${{ secrets.PHOENIX_DOMAIN }}"
          EMAIL="${{ secrets.CADDY_EMAIL }}"
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash <<EOF
          cat > $DEPLOY_DIR/.env <<ENV
          PHOENIX_DATA_DIR=$DATA_DIR
          PHOENIX_DOMAIN=$DOMAIN
          CADDY_EMAIL=$EMAIL
          ENV
          chmod 600 $DEPLOY_DIR/.env
          EOF

      # ----- 5. Make sure the persistent data dir exists on EC2 -----
      - name: Ensure data directory exists on EC2
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash <<'EOF'
          set -e
          DATA_DIR="${PHOENIX_DATA_DIR:-/var/phoenix-data}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "first-time setup: creating $DATA_DIR"
            sudo mkdir -p "$DATA_DIR/downloaded" "$DATA_DIR/logs"
            sudo chown -R 1000:1000 "$DATA_DIR"
            sudo chmod 750 "$DATA_DIR"
          else
            echo "$DATA_DIR exists, preserving contents"
            # Defensive chown — covers the case where someone touched perms by hand.
            sudo chown -R 1000:1000 "$DATA_DIR"
          fi
          EOF

      # ----- 6. Rebuild and restart the container -----
      # We do NOT run `docker compose down` first. `up -d --build` is
      # zero-downtime when the image hasn't changed and near-zero (~1s) when
      # it has. The bind mount reattaches automatically, so phoenix-data
      # stays mounted across container recreates.
      - name: Build image and (re)start container
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash <<EOF
          set -e
          cd "$DEPLOY_DIR"
          # --profile prod starts both Phoenix AND Caddy (the reverse proxy).
          # Caddy provisions a Let's Encrypt cert on first start (assumes
          # PHOENIX_DOMAIN resolves to this server's IP via Route 53).
          docker compose --profile prod up -d --build
          # Brief settle, then dump status + last log lines for visibility in
          # the GitHub Actions UI.
          sleep 4
          docker compose --profile prod ps
          echo "----- phoenix logs (last 20) -----"
          docker compose logs --tail 20 phoenix
          echo "----- caddy logs (last 20) -----"
          docker compose logs --tail 20 caddy || true
          EOF

      # ----- 7. Sanity check: the running container answers HTTP -----
      - name: Smoke test
        env:
          PHOENIX_DOMAIN: ${{ secrets.PHOENIX_DOMAIN }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "PHOENIX_DOMAIN='$PHOENIX_DOMAIN' bash -s" <<'EOF'
          set -e

          # 1. Phoenix itself, via the loopback port. 401 = auth gate working.
          status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/license || true)
          if [ "$status" = "401" ]; then
            echo "OK   phoenix /license returned 401 (auth gate working)"
          elif [ "$status" = "200" ]; then
            echo "FAIL phoenix /license returned 200 (auth gate OFF; check GH Secrets)"
            exit 1
          else
            echo "FAIL phoenix /license returned $status (container down or misconfigured)"
            exit 1
          fi

          # 2. Caddy → Phoenix via HTTPS. Only meaningful if PHOENIX_DOMAIN
          # resolves to this server and the cert was issued.
          if [ -n "$PHOENIX_DOMAIN" ]; then
            echo "Probing https://$PHOENIX_DOMAIN/license ..."
            # Caddy can take 20-60s on first start to fetch a Let's Encrypt cert.
            for i in 1 2 3 4 5 6; do
              hstatus=$(curl -s -o /dev/null -w "%{http_code}" "https://$PHOENIX_DOMAIN/license" || true)
              if [ "$hstatus" = "401" ]; then
                echo "OK   https://$PHOENIX_DOMAIN/license returned 401 (TLS + auth working)"
                break
              fi
              echo "  attempt $i: status=$hstatus, waiting 10s for cert / startup..."
              sleep 10
            done
            if [ "$hstatus" != "401" ]; then
              echo "WARN https probe ended on status $hstatus"
              echo "     Cert may still be provisioning. Check 'docker compose logs caddy'"
              echo "     on the EC2 host. Common causes: DNS not yet resolving, port 80"
              echo "     not reachable from the public internet, or Let's Encrypt rate limit."
              # Don't fail the deploy on this — TLS provisioning timing varies.
            fi
          else
            echo "Skipping HTTPS probe (PHOENIX_DOMAIN secret not set)."
          fi
          EOF

      # ----- 8. Always clean up the SSH key, even if a step failed -----
      - name: Wipe SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
